services:
  - type: web
    name: doc-intel-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: doc-intel-db
          property: connectionString
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

databases:
  - name: doc-intel-db
    plan: free
    databaseName: docintel
    user: docintel